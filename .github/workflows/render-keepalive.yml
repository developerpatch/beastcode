name: Render Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "2,9,16,23,30,37,44,51,58 * * * *"
    - cron: "1,11,21,31,41,51 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate keepalive URL
        run: |
          if [ -z "${{ secrets.RENDER_KEEPALIVE_URL }}" ]; then
            echo "RENDER_KEEPALIVE_URL is not configured."
            exit 1
          fi

      - name: Ping backend health endpoint
        env:
          TARGET_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
          API_KEY: ${{ secrets.YTM_BACKEND_API_KEY }}
        run: |
          echo "Pinging ${TARGET_URL}"
          if [ -n "${API_KEY}" ]; then
            curl --fail --show-error --silent \
              --max-time 30 \
              --retry 2 \
              --retry-delay 5 \
              -H "x-api-key: ${API_KEY}" \
              "${TARGET_URL}"
          else
            curl --fail --show-error --silent \
              --max-time 30 \
              --retry 2 \
              --retry-delay 5 \
              "${TARGET_URL}"
          fi
