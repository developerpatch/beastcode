name: beastcode
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  beastclient:
    path: packages/beastclient
  http: ^1.2.2
  protobuf: ^3.1.0
  oauth2: ^2.0.5
  google_sign_in: ^6.2.1
  app_links: ^6.3.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

  # Use latest 2.x — has multi-client support (android, ios, tv, androidVr, web)
  youtube_explode_dart: ^2.3.6
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.17
  audio_service: ^0.18.18
  cached_network_image: ^3.4.0
  crypto: ^3.0.6
  path_provider: ^2.1.4
  webview_flutter: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png

dependency_overrides:
  just_audio_background:
    path: third_party/just_audio_background
